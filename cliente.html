<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultados de campaña — Grupo Neruc</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app"></div>

<script>
async function init() {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('c');
  const app = document.getElementById('app');

  if (!slug) {
    app.innerHTML = renderState('🔗', 'Falta el link completo', 'Este enlace parece incompleto. Usa el link exacto que te compartió Grupo Neruc, incluyendo la parte final después de "?c=".');
    return;
  }

  let data;
  try {
    const res = await fetch('data/' + encodeURIComponent(slug) + '.json', { cache: 'no-store' });
    if (!res.ok) throw new Error('not found');
    data = await res.json();
  } catch (e) {
    app.innerHTML = renderState('🕓', 'Aún no hay resultados aquí', 'Todavía no se ha publicado un reporte para este link. Si crees que esto es un error, contacta a tu contacto en Grupo Neruc.');
    return;
  }

  render(data);
}

function renderState(icon, title, text) {
  return `
    ${headerHTML(null)}
    <div class="state-box">
      <div class="icon">${icon}</div>
      <h2>${title}</h2>
      <p>${text}</p>
    </div>
    ${footerHTML()}
  `;
}

function headerHTML(clientName) {
  return `
  <div class="header">
    <div class="header-inner">
      <div class="header-brand">
        <img src="assets/shield-canonical.svg" alt="Neruc">
        <div>
          <div class="name">GRUPO NERUC</div>
          <div class="sub">RESULTADOS DE CAMPAÑA</div>
        </div>
      </div>
      ${clientName ? `<div class="header-meta"><div class="lbl">CLIENTE</div><div class="val">${escapeHTML(clientName)}</div></div>` : ''}
    </div>
  </div>`;
}

function footerHTML() {
  return `<div class="footer">GRUPO NERUC · PORTAL DE RESULTADOS · CONFIDENCIAL</div>`;
}

function escapeHTML(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function fmtNum(n) {
  return Number(n).toLocaleString('es-MX', { maximumFractionDigits: 2 });
}

function barChart(title, unit, items, valueKey, fmt) {
  const max = Math.max(...items.map(i => Number(i[valueKey]) || 0), 1);
  const rows = items.map(i => {
    const val = Number(i[valueKey]) || 0;
    const pct = Math.max((val / max) * 100, val > 0 ? 2 : 0);
    const valLabel = fmt ? fmt(val) : fmtNum(val);
    return `
      <div class="bar-row" title="${escapeHTML(i.nombre)}: ${escapeHTML(valLabel)}${unit ? ' ' + unit : ''}">
        <div class="bar-label">${escapeHTML(i.nombre)}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        <div class="bar-value">${escapeHTML(valLabel)}</div>
      </div>`;
  }).join('');
  return `
    <div class="section">
      <div class="section-title">${escapeHTML(title)}</div>
      <div class="barchart">${rows}</div>
    </div>`;
}

const KPI_ICONS = [
  ['costo por lead', '💰'],
  ['costo por conversación', '💰'],
  ['leads generados', '🎯'],
  ['leads whatsapp', '💬'],
  ['leads formulario', '📝'],
  ['conversaciones iniciadas', '💬'],
  ['alcance', '👥'],
  ['gasto', '💵'],
];

function kpiIcon(label) {
  const l = label.toLowerCase();
  const hit = KPI_ICONS.find(([key]) => l.includes(key));
  return hit ? hit[1] : '📊';
}

function parseNumFromValor(valor) {
  if (valor == null) return null;
  const cleaned = String(valor).replace(/[^0-9.\-]/g, '');
  if (cleaned === '' || cleaned === '-') return null;
  const n = parseFloat(cleaned);
  return isNaN(n) ? null : n;
}

function findKpiValue(mes, labelSubstr) {
  const k = (mes.kpis || []).find(k => k.label.toLowerCase().includes(labelSubstr));
  return k ? parseNumFromValor(k.valor) : null;
}

function lineChart(title, points, fmt) {
  const pts = points.filter(p => p.value != null);
  if (pts.length < 2) return '';
  const w = 640, h = 170, padX = 26, padTop = 30, padBottom = 24;
  const values = pts.map(p => p.value);
  const min = Math.min(...values), max = Math.max(...values);
  const range = (max - min) || Math.max(max, 1);
  const stepX = (w - padX * 2) / (pts.length - 1);
  const coords = pts.map((p, i) => ({
    x: padX + i * stepX,
    y: h - padBottom - ((p.value - min) / range) * (h - padTop - padBottom),
    ...p
  }));
  const pathD = coords.map((c, i) => (i === 0 ? 'M' : 'L') + c.x.toFixed(1) + ' ' + c.y.toFixed(1)).join(' ');
  const label = v => fmt ? fmt(v) : fmtNum(v);
  const dots = coords.map(c => `
    <circle cx="${c.x.toFixed(1)}" cy="${c.y.toFixed(1)}" r="4" fill="#7c3aed">
      <title>${escapeHTML(c.label)}: ${escapeHTML(label(c.value))}</title>
    </circle>`).join('');
  const last = coords[coords.length - 1];
  const endLabel = `<text x="${last.x.toFixed(1)}" y="${(last.y - 12).toFixed(1)}" text-anchor="middle" class="chart-endlabel">${escapeHTML(label(last.value))}</text>`;
  const xLabels = coords.map(c => `<text x="${c.x.toFixed(1)}" y="${h - 6}" text-anchor="middle" class="chart-xlabel">${escapeHTML(c.label)}</text>`).join('');
  return `
    <div class="chart-box">
      <div class="chart-box-title">${escapeHTML(title)}</div>
      <svg viewBox="0 0 ${w} ${h}" class="linechart" preserveAspectRatio="xMidYMid meet">
        <path d="${pathD}" fill="none" stroke="#7c3aed" stroke-width="2"/>
        ${dots}
        ${endLabel}
        ${xLabels}
      </svg>
    </div>`;
}

function resolveContent(mes, vistaKey) {
  if (!vistaKey) return mes;
  return (mes.vistas && mes.vistas[vistaKey]) || {};
}

function renderEvolucion(months, vistaKey) {
  if (months.length < 2) return '';
  const shortLabel = m => (m.mes_label || m.mes).split(' ')[0].slice(0, 3);
  const leadsPts = months.map(m => { const c = resolveContent(m, vistaKey); return { label: shortLabel(m), value: findKpiValue(c, 'leads generados') ?? findKpiValue(c, 'conversaciones iniciadas') }; });
  const cplPts = months.map(m => { const c = resolveContent(m, vistaKey); return { label: shortLabel(m), value: findKpiValue(c, 'costo por lead') ?? findKpiValue(c, 'costo por conversación') }; });
  const chartLeads = lineChart('Leads por mes', leadsPts);
  const chartCpl = lineChart('Costo por lead por mes', cplPts, v => '$' + fmtNum(v));
  if (!chartLeads && !chartCpl) return '';
  return `
    <div class="section">
      <div class="section-title">Evolución mensual</div>
      <div class="chart-grid">${chartLeads}${chartCpl}</div>
    </div>`;
}

function renderComparativa(comparativa) {
  const campanas = comparativa?.campanas || [];
  if (!campanas.length) return '';
  const porLeads = [...campanas].sort((a, b) => (b.leads || 0) - (a.leads || 0));
  const porCPL = [...campanas].filter(c => c.cpl != null).sort((a, b) => (a.cpl || 0) - (b.cpl || 0));
  return `
    ${barChart('Comparativa de campañas — Leads del mes', null, porLeads, 'leads')}
    ${porCPL.length ? barChart('Comparativa de campañas — Costo por lead', 'MXN', porCPL, 'cpl', v => '$' + fmtNum(v)) : ''}
  `;
}

const FEEDBACK_EMAIL = 'operaciones@gruponeruc.com';

function renderFeedback(mes, vista) {
  return `
    <div class="section">
      <div class="section-title">💬 Cuéntanos cómo llegaron tus leads</div>
      <div class="feedback-box">
        <p class="feedback-note">Esto es opcional y no sustituye un reporte de ventas formal — solo nos ayuda a optimizar tus campañas del próximo mes.</p>

        <div class="feedback-quality">
          <label><input type="radio" name="fb-calidad" value="Buena calidad"> 🟢 Buena calidad</label>
          <label><input type="radio" name="fb-calidad" value="Calidad media"> 🟡 Calidad media</label>
          <label><input type="radio" name="fb-calidad" value="Baja calidad"> 🔴 Baja calidad</label>
        </div>

        <textarea id="fb-comentario" placeholder="¿Algo que debamos saber sobre estos leads? (opcional)"></textarea>

        <div class="feedback-ventas">
          <div>
            <label for="fb-ventas">Ventas cerradas este mes (opcional)</label>
            <input type="number" min="0" id="fb-ventas" placeholder="0">
          </div>
          <div>
            <label for="fb-valor">Valor total de esas ventas, MXN (opcional)</label>
            <input type="number" min="0" id="fb-valor" placeholder="0">
          </div>
        </div>

        <button type="button" id="fb-enviar" class="feedback-btn">Enviar retroalimentación</button>
        <p class="feedback-hint">Se abrirá tu correo con un mensaje ya armado, listo para mandar a Grupo NERUC.</p>
      </div>
    </div>`;
}

function attachFeedbackHandler(mes, clienteNombre, vista) {
  const btn = document.getElementById('fb-enviar');
  if (!btn) return;
  btn.addEventListener('click', () => {
    const calidadEl = document.querySelector('input[name="fb-calidad"]:checked');
    const comentario = document.getElementById('fb-comentario').value.trim();
    const ventas = document.getElementById('fb-ventas').value.trim();
    const valor = document.getElementById('fb-valor').value.trim();

    const lines = [
      `Cliente: ${clienteNombre || ''}`,
      vista ? `Agencia/vista: ${vista.label}` : null,
      `Mes: ${mes.mes_label || mes.mes}`,
      calidadEl ? `Calidad de los leads: ${calidadEl.value}` : null,
      comentario ? `Comentarios: ${comentario}` : null,
      ventas ? `Ventas cerradas: ${ventas}` : null,
      valor ? `Valor total de ventas: $${valor} MXN` : null,
    ].filter(Boolean);

    const subject = `Retroalimentación — ${clienteNombre || 'cliente'}${vista ? ' — ' + vista.label : ''} — ${mes.mes_label || mes.mes}`;
    const body = lines.join('\n');
    window.location.href = `mailto:${FEEDBACK_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  });
}

function fmtDelta(delta) {
  if (delta === null || delta === undefined || delta === '') return '';
  const n = parseFloat(delta);
  if (isNaN(n)) return `<div class="delta flat">${delta}</div>`;
  const cls = n > 0 ? 'up' : n < 0 ? 'down' : 'flat';
  const arrow = n > 0 ? '▲' : n < 0 ? '▼' : '—';
  return `<div class="delta ${cls}">${arrow} ${Math.abs(n)}% vs mes anterior</div>`;
}

function render(data) {
  const app = document.getElementById('app');
  const months = data.meses || [];
  const vistas = data.vistas && data.vistas.length ? data.vistas : null;
  const currentMonthKey = months.length ? months[months.length - 1].mes : null;
  let currentVista = vistas ? vistas[0].key : null;

  function renderMonth(mesKey) {
    const mes = months.find(m => m.mes === mesKey) || months[months.length - 1];
    if (!mes) return;

    const content = resolveContent(mes, currentVista);

    const vistaPicker = vistas ? `
      <div class="vista-picker">${vistas.map(v => `
        <div class="vista-chip ${v.key === currentVista ? 'active' : ''}" data-vista="${v.key}">${escapeHTML(v.label)}</div>
      `).join('')}</div>` : '';

    const chips = months.map(m => `
      <div class="month-chip ${m.mes === mes.mes ? 'active' : ''}" data-mes="${m.mes}">${m.mes_label || m.mes}</div>
    `).join('');

    const kpis = (content.kpis || []).map(k => `
      <div class="kpi-card">
        <div class="lbl"><span class="kpi-icon">${kpiIcon(k.label)}</span>${escapeHTML(k.label)}</div>
        <div class="val">${escapeHTML(k.valor)}</div>
        ${fmtDelta(k.delta_pct)}
      </div>
    `).join('');

    const evolucion = renderEvolucion(months, currentVista);

    const tablaRows = (content.tabla?.filas || []).map(fila => `
      <tr>${fila.map(c => `<td>${escapeHTML(String(c))}</td>`).join('')}</tr>
    `).join('');

    const tablaHead = content.tabla?.columnas
      ? `<tr>${content.tabla.columnas.map(c => `<th>${escapeHTML(c)}</th>`).join('')}</tr>`
      : '';

    const recos = (content.recomendaciones || []).map(r => `<li>${escapeHTML(r)}</li>`).join('');

    const charts = renderComparativa(content.comparativa);

    app.innerHTML = `
      ${headerHTML(data.cliente_nombre)}
      <div class="wrap">
        <div class="eyebrow">REPORTE MENSUAL</div>
        <h1 class="title">Resultados de <b>${escapeHTML(data.cliente_nombre || 'tu campaña')}</b></h1>
        <div class="subtitle">Meta Ads · Grupo NERUC — última actualización: ${escapeHTML(data.actualizado || '')}</div>

        ${vistaPicker}

        <div class="month-picker">${chips}</div>

        <div class="kpi-grid">${kpis || '<p style="color:#94a3b8;font-size:13px;">Sin KPIs cargados para este mes.</p>'}</div>

        ${evolucion}

        ${content.insight ? `
        <div class="section">
          <div class="section-title">Lectura del mes</div>
          <div class="insight-box">${escapeHTML(content.insight)}</div>
        </div>` : ''}

        ${charts}

        ${content.tabla ? `
        <div class="section">
          <div class="section-title">Detalle</div>
          <div class="table-scroll"><table class="results"><thead>${tablaHead}</thead><tbody>${tablaRows}</tbody></table></div>
        </div>` : ''}

        ${recos ? `
        <div class="section">
          <div class="section-title">Recomendaciones</div>
          <ul class="reco">${recos}</ul>
        </div>` : ''}

        ${renderFeedback(mes, vistas ? vistas.find(v => v.key === currentVista) : null)}
      </div>
      ${footerHTML()}
    `;

    document.querySelectorAll('.month-chip').forEach(chip => {
      chip.addEventListener('click', () => renderMonth(chip.dataset.mes));
    });
    document.querySelectorAll('.vista-chip').forEach(chip => {
      chip.addEventListener('click', () => { currentVista = chip.dataset.vista; renderMonth(mes.mes); });
    });
    attachFeedbackHandler(mes, data.cliente_nombre, vistas ? vistas.find(v => v.key === currentVista) : null);
  }

  renderMonth(currentMonthKey);
}

init();
</script>

</body>
</html>
